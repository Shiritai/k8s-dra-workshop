# Workload A: 4Gi Request (Should Succeed)
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: claim-small
spec:
  devices:
    requests:
    - name: req-1
      exactly:
        deviceClassName: gpu-capacity.nvidia.com
        capacity:
          requests:
            memory: 4Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-small
spec:
  hostIPC: true
  containers:
  - name: cuda-container
    image: nvidia/cuda:12.3.1-base-ubuntu22.04
    command: ["sleep", "inf"]
    env:
    - name: CUDA_MPS_PIPE_DIRECTORY
      value: /tmp/nvidia-mps
    volumeMounts:
    - mountPath: /tmp/nvidia-mps
      name: mps-pipe
    resources:
      claims:
      - name: claim-ref-1
  resourceClaims:
  - name: claim-ref-1
    resourceClaimName: claim-small
  volumes:
  - name: mps-pipe
    hostPath:
      path: /tmp/nvidia-mps
  restartPolicy: Never
---
