# M11.1b: Server-Side Memory Limit Verification
# Goal: Prove that defaultPinnedDeviceMemoryLimit: 8Gi is NOT enforced on MIG devices.
#       Pod 1: 6 GiB (under limit, should succeed)
#       Pod 2: 12 GiB (over limit — succeeds because limit is broken on MIG)
#       Pod 3: 6 GiB (under limit, may OOM due to physical memory exhaustion)
# See also: 11.1c-client-limit-workaround.yaml for the working client-side approach.

apiVersion: v1
kind: ConfigMap
metadata:
  name: m11-1b-limit-test
data:
  limit_test.cu: |
    #include <stdio.h>
    #include <stdlib.h>
    #include <string.h>
    #include <unistd.h>
    #include <cuda_runtime.h>

    int main() {
        const char* env = getenv("ALLOC_MIB");
        size_t alloc_mib = env ? (size_t)atol(env) : 4096;
        size_t alloc_bytes = alloc_mib * 1024ULL * 1024ULL;

        size_t free_mem, total_mem;
        cudaError_t err = cudaMemGetInfo(&free_mem, &total_mem);
        if (err != cudaSuccess) {
            printf("[cuda] cudaMemGetInfo FAILED: %s (code %d)\n", cudaGetErrorString(err), (int)err);
            return 1;
        }
        printf("[cuda] GPU memory: total=%zu MiB, free=%zu MiB\n",
               total_mem / (1024*1024), free_mem / (1024*1024));
        printf("[cuda] Attempting to allocate %zu MiB...\n", alloc_mib);
        fflush(stdout);

        void* ptr = NULL;
        err = cudaMalloc(&ptr, alloc_bytes);
        if (err != cudaSuccess) {
            printf("[cuda] FAILED: %s (code %d)\n", cudaGetErrorString(err), (int)err);
            printf("[cuda] Conclusion: allocation of %zu MiB was rejected.\n", alloc_mib);
            fflush(stdout);
            sleep(30);
            return 1;
        }

        printf("[cuda] Success: %zu MiB allocated at %p\n", alloc_mib, ptr);
        printf("[cuda] Writing to allocated memory to verify usability...\n");
        fflush(stdout);

        err = cudaMemset(ptr, 0xAB, alloc_bytes);
        if (err != cudaSuccess) {
            printf("[cuda] cudaMemset FAILED: %s (code %d)\n", cudaGetErrorString(err), (int)err);
            fflush(stdout);
            sleep(30);
            return 1;
        }

        printf("[cuda] Memory write verified OK (%zu MiB written).\n", alloc_mib);

        size_t free_after, total_after;
        cudaMemGetInfo(&free_after, &total_after);
        printf("[cuda] GPU memory after alloc: total=%zu MiB, free=%zu MiB\n",
               total_after / (1024*1024), free_after / (1024*1024));
        fflush(stdout);

        printf("[cuda] Sleeping 300s to keep allocation alive...\n");
        fflush(stdout);
        sleep(300);

        cudaFree(ptr);
        return 0;
    }
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-1b-limit-claim
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 50
              defaultPinnedDeviceMemoryLimit: 8Gi
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1b-limit-pod-1
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -o /tmp/limit_test /scripts/limit_test.cu -lcudart && /tmp/limit_test"]
    env:
    - name: ALLOC_MIB
      value: "6144"
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      claims: [{name: gpu}]
  volumes:
  - name: scripts
    configMap:
      name: m11-1b-limit-test
  resourceClaims: [{name: gpu, resourceClaimName: m11-1b-limit-claim}]
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1b-limit-pod-2
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -o /tmp/limit_test /scripts/limit_test.cu -lcudart && /tmp/limit_test"]
    env:
    - name: ALLOC_MIB
      value: "12288"
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      claims: [{name: gpu}]
  volumes:
  - name: scripts
    configMap:
      name: m11-1b-limit-test
  resourceClaims: [{name: gpu, resourceClaimName: m11-1b-limit-claim}]
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1b-limit-pod-3
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -o /tmp/limit_test /scripts/limit_test.cu -lcudart && /tmp/limit_test"]
    env:
    - name: ALLOC_MIB
      value: "6144"
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      claims: [{name: gpu}]
  volumes:
  - name: scripts
    configMap:
      name: m11-1b-limit-test
  resourceClaims: [{name: gpu, resourceClaimName: m11-1b-limit-claim}]
  restartPolicy: Never
