# M11.2a: Multi-Device MPS per Pod — Equal Split
#
# Design: 2 ResourceClaims targeting 2 different MIG devices via MPS.
#   - Claim 1: targets a MIG slice on GPU-0 (3g.20gb) with MPS 50%
#   - Claim 2: targets a MIG slice on GPU-1 (7g.40gb) with MPS 50%
#
# This tests whether a single Pod can consume MPS-shared resources from
# two different MIG devices simultaneously.
# Note: DRA allocates each claim to a different device automatically (one-claim-one-device).

apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-2a-claim-gpu0
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 50
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-2a-claim-gpu1
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 50
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com

---
apiVersion: v1
kind: Pod
metadata:
  name: m11-2a-dual-gpu
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-base-ubuntu22.04
    command:
    - sh
    - -c
    - |
      echo '=== Multi-Device MPS Pod (2 MIG slices, both 50% MPS) ==='
      echo "CUDA_VISIBLE_DEVICES=$CUDA_VISIBLE_DEVICES"
      nvidia-smi -L
      nvidia-smi
      echo '=== MPS check ==='
      ls -la /tmp/nvidia-mps* 2>/dev/null || echo "No MPS control files found"
      env | grep -i mps || echo "No MPS env vars"
      sleep 3600
    resources:
      claims:
      - name: gpu0
      - name: gpu1
  resourceClaims:
  - name: gpu0
    resourceClaimName: m11-2a-claim-gpu0
  - name: gpu1
    resourceClaimName: m11-2a-claim-gpu1
  restartPolicy: Never
