# M11-1b: Client-Side SM Thread Limit (CUDA_MPS_ACTIVE_THREAD_PERCENTAGE)
# Goal: Prove per-client SM limits on MIG via env var.
#       Daemon ceiling is 100% (no server-side limit), purely client-side control.
#       Pod 1: 10%, Pod 2: 30%, Pod 3: 50%
# CUDA source: cuda/fma_bench.cu (shared with 11-1a)

apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-1b-claim
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1b-pod-1
spec:
  containers:
  - name: cuda-bench
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -O3 -o /tmp/bench /cuda/fma_bench.cu && /tmp/bench"]
    env:
    - name: CUDA_MPS_ACTIVE_THREAD_PERCENTAGE
      value: "10"
    volumeMounts:
    - name: cuda-src
      mountPath: /cuda
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: m11-1b-claim}]
  volumes:
  - name: cuda-src
    configMap:
      name: m11-1-cuda
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1b-pod-2
spec:
  containers:
  - name: cuda-bench
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -O3 -o /tmp/bench /cuda/fma_bench.cu && /tmp/bench"]
    env:
    - name: CUDA_MPS_ACTIVE_THREAD_PERCENTAGE
      value: "30"
    volumeMounts:
    - name: cuda-src
      mountPath: /cuda
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: m11-1b-claim}]
  volumes:
  - name: cuda-src
    configMap:
      name: m11-1-cuda
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1b-pod-3
spec:
  containers:
  - name: cuda-bench
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -O3 -o /tmp/bench /cuda/fma_bench.cu && /tmp/bench"]
    env:
    - name: CUDA_MPS_ACTIVE_THREAD_PERCENTAGE
      value: "50"
    volumeMounts:
    - name: cuda-src
      mountPath: /cuda
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: m11-1b-claim}]
  volumes:
  - name: cuda-src
    configMap:
      name: m11-1-cuda
  restartPolicy: Never
