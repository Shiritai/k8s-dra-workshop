# M11.1a-stress: SM Compute Throughput Under MPS Oversubscription
# Goal: Measure actual compute throughput when 3 Pods each get 50% SM threads
#       (total 150% > 100%) on a shared MIG device via MPS.
# Usage:
#   kubectl apply -f 11.1a-sm-compute-stress.yaml
#   kubectl logs m11-1a-stress-pod-1  # compare throughput across pods
# Expected: Each pod's throughput degrades compared to running alone.

apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-1a-stress-claim
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 50
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: m11-1a-stress-cuda
data:
  bench.cu: |
    #include <stdio.h>
    #include <stdlib.h>
    #include <unistd.h>
    #include <cuda_runtime.h>
    #include <sys/time.h>

    // Vector size: 16M elements ≈ 64 MB per array (float)
    #define N (16 * 1024 * 1024)
    #define ITERATIONS 200
    #define BLOCK_SIZE 256

    // Fused multiply-add kernel: c[i] = a[i] * b[i] + c[i], repeated in-kernel
    // Each thread does INNER_ITERS FMAs to keep SMs busy
    #define INNER_ITERS 64

    __global__ void fma_stress(const float* __restrict__ a,
                               const float* __restrict__ b,
                               float* __restrict__ c, int n) {
        int idx = blockIdx.x * blockDim.x + threadIdx.x;
        if (idx >= n) return;
        float va = a[idx];
        float vb = b[idx];
        float vc = c[idx];
        #pragma unroll
        for (int i = 0; i < INNER_ITERS; i++) {
            vc = va * vb + vc;  // FMA
        }
        c[idx] = vc;
    }

    static double now_sec() {
        struct timeval tv;
        gettimeofday(&tv, NULL);
        return tv.tv_sec + tv.tv_usec * 1e-6;
    }

    #define CHECK(call) do { \
        cudaError_t err = (call); \
        if (err != cudaSuccess) { \
            fprintf(stderr, "CUDA error %s:%d: %s\n", __FILE__, __LINE__, \
                    cudaGetErrorString(err)); \
            exit(1); \
        } \
    } while(0)

    int main() {
        size_t bytes = (size_t)N * sizeof(float);
        float *d_a, *d_b, *d_c;

        CHECK(cudaMalloc(&d_a, bytes));
        CHECK(cudaMalloc(&d_b, bytes));
        CHECK(cudaMalloc(&d_c, bytes));

        // Initialize with simple values
        float *h = (float*)malloc(bytes);
        for (int i = 0; i < N; i++) h[i] = 1.0f;
        CHECK(cudaMemcpy(d_a, h, bytes, cudaMemcpyHostToDevice));
        for (int i = 0; i < N; i++) h[i] = 0.5f;
        CHECK(cudaMemcpy(d_b, h, bytes, cudaMemcpyHostToDevice));
        CHECK(cudaMemset(d_c, 0, bytes));
        free(h);

        int grid = (N + BLOCK_SIZE - 1) / BLOCK_SIZE;

        // Warmup
        for (int i = 0; i < 5; i++)
            fma_stress<<<grid, BLOCK_SIZE>>>(d_a, d_b, d_c, N);
        CHECK(cudaDeviceSynchronize());

        printf("[bench] starting: N=%d INNER_ITERS=%d ITERATIONS=%d\n",
               N, INNER_ITERS, ITERATIONS);
        fflush(stdout);

        double t0 = now_sec();
        for (int i = 0; i < ITERATIONS; i++) {
            fma_stress<<<grid, BLOCK_SIZE>>>(d_a, d_b, d_c, N);
        }
        CHECK(cudaDeviceSynchronize());
        double t1 = now_sec();

        double elapsed = t1 - t0;
        // Each element does INNER_ITERS FMAs (2 flops each) per iteration
        double total_ops = 2.0 * INNER_ITERS * (double)N * ITERATIONS;
        double gflops = total_ops / elapsed / 1e9;

        printf("[bench] iterations=%d elapsed=%.3fs throughput=%.2f GFLOPS\n",
               ITERATIONS, elapsed, gflops);
        fflush(stdout);

        cudaFree(d_a);
        cudaFree(d_b);
        cudaFree(d_c);

        // Keep running so all 3 pods overlap
        printf("[bench] done, sleeping to keep pod alive...\n");
        fflush(stdout);
        sleep(3600);
        return 0;
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1a-stress-pod-1
spec:
  containers:
  - name: cuda-bench
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command:
    - sh
    - -c
    - |
      echo "[pod-1] compiling bench.cu..."
      nvcc -O3 -o /tmp/bench /cuda/bench.cu && \
      echo "[pod-1] running benchmark..." && \
      /tmp/bench
    volumeMounts:
    - name: cuda-src
      mountPath: /cuda
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: m11-1a-stress-claim}]
  volumes:
  - name: cuda-src
    configMap:
      name: m11-1a-stress-cuda
  restartPolicy: Never
---
