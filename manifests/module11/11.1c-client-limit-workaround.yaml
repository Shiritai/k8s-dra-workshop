# M11.1c: Client-Side MPS Memory Limit Workaround
#
# Tests whether MPS per-client memory limits actually work on MIG devices.
# Uses CUDA_MPS_PINNED_DEVICE_MEM_LIMIT env var as workaround for the
# DRA driver bug where server-side set_default_device_pinned_mem_limit
# is sent after daemon start (too late if server already spawned).
#
# Setup: 1 shared MIG claim (MPS 50%), 3 Pods with different alloc sizes
#   Pod 1: 4.5 GiB alloc, 4 GiB client limit → expected OOM (MPS limit, NOT physical)
#   Pod 2:   3 GiB alloc, 4 GiB client limit → expected success
#   Pod 3:   3 GiB alloc, 4 GiB client limit → expected success
#
# Key: CUDA_MPS_PINNED_DEVICE_MEM_LIMIT=0=4096M is set per-pod (client-side)
#       to enforce the limit the DRA driver fails to apply on MIG.
#
# Note: On 3g.20gb MIG (~20 GiB), 3 CUDA/MPS contexts consume ~9 GiB overhead,
#       leaving ~11 GiB free. Pod 1's 4.5 GiB fits physically (< 11 GiB free)
#       but exceeds the 4 GiB MPS limit — if the limit works, Pod 1 fails.

apiVersion: v1
kind: ConfigMap
metadata:
  name: m11-1c-mps-limit-cuda
data:
  limit_test.cu: |
    #include <stdio.h>
    #include <stdlib.h>
    #include <string.h>
    #include <unistd.h>
    #include <cuda_runtime.h>

    int main() {
        const char* env_alloc = getenv("ALLOC_MIB");
        size_t alloc_mib = env_alloc ? (size_t)atol(env_alloc) : 4096;
        size_t alloc_bytes = alloc_mib * 1024ULL * 1024ULL;

        // Print MPS env for verification
        const char* mps_limit = getenv("CUDA_MPS_PINNED_DEVICE_MEM_LIMIT");
        printf("[env] CUDA_MPS_PINNED_DEVICE_MEM_LIMIT=%s\n",
               mps_limit ? mps_limit : "(unset)");

        size_t free_mem, total_mem;
        cudaError_t err = cudaMemGetInfo(&free_mem, &total_mem);
        if (err != cudaSuccess) {
            printf("[cuda] cudaMemGetInfo FAILED: %s (code %d)\n",
                   cudaGetErrorString(err), (int)err);
            return 1;
        }
        printf("[cuda] GPU memory: total=%zu MiB, free=%zu MiB\n",
               total_mem / (1024*1024), free_mem / (1024*1024));
        printf("[cuda] Attempting to allocate %zu MiB...\n", alloc_mib);
        fflush(stdout);

        void* ptr = NULL;
        err = cudaMalloc(&ptr, alloc_bytes);
        if (err != cudaSuccess) {
            printf("[cuda] FAILED: %s (code %d)\n",
                   cudaGetErrorString(err), (int)err);
            printf("[cuda] Conclusion: allocation of %zu MiB was rejected.\n",
                   alloc_mib);
            fflush(stdout);
            sleep(60);
            return 1;
        }

        printf("[cuda] Success: %zu MiB allocated at %p\n", alloc_mib, ptr);
        printf("[cuda] Writing to allocated memory (cudaMemset)...\n");
        fflush(stdout);

        err = cudaMemset(ptr, 0xAB, alloc_bytes);
        if (err != cudaSuccess) {
            printf("[cuda] cudaMemset FAILED: %s (code %d)\n",
                   cudaGetErrorString(err), (int)err);
            fflush(stdout);
            sleep(60);
            return 1;
        }

        printf("[cuda] Memory write verified OK (%zu MiB written).\n", alloc_mib);

        size_t free_after, total_after;
        cudaMemGetInfo(&free_after, &total_after);
        printf("[cuda] GPU memory after alloc: total=%zu MiB, free=%zu MiB\n",
               total_after / (1024*1024), free_after / (1024*1024));
        fflush(stdout);

        printf("[cuda] Sleeping 300s to keep allocation alive...\n");
        fflush(stdout);
        sleep(300);

        cudaFree(ptr);
        return 0;
    }
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-1c-mps-limit-claim
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 50
              defaultPinnedDeviceMemoryLimit: 4Gi
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com
---
# Pod 1: 4.5 GiB alloc — should fail (exceeds 4 GiB MPS client limit, but fits physically)
apiVersion: v1
kind: Pod
metadata:
  name: m11-1c-mps-pod-1
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -o /tmp/limit_test /scripts/limit_test.cu -lcudart && /tmp/limit_test"]
    env:
    - name: ALLOC_MIB
      value: "4608"
    - name: CUDA_MPS_PINNED_DEVICE_MEM_LIMIT
      value: "0=4096M"
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      claims: [{name: gpu}]
  volumes:
  - name: scripts
    configMap:
      name: m11-1c-mps-limit-cuda
  resourceClaims: [{name: gpu, resourceClaimName: m11-1c-mps-limit-claim}]
  restartPolicy: Never
---
# Pod 2: 3 GiB alloc — should succeed (within 4 GiB limit)
apiVersion: v1
kind: Pod
metadata:
  name: m11-1c-mps-pod-2
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -o /tmp/limit_test /scripts/limit_test.cu -lcudart && /tmp/limit_test"]
    env:
    - name: ALLOC_MIB
      value: "3072"
    - name: CUDA_MPS_PINNED_DEVICE_MEM_LIMIT
      value: "0=4096M"
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      claims: [{name: gpu}]
  volumes:
  - name: scripts
    configMap:
      name: m11-1c-mps-limit-cuda
  resourceClaims: [{name: gpu, resourceClaimName: m11-1c-mps-limit-claim}]
  restartPolicy: Never
---
# Pod 3: 3 GiB alloc — should succeed (within 4 GiB limit)
apiVersion: v1
kind: Pod
metadata:
  name: m11-1c-mps-pod-3
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "nvcc -o /tmp/limit_test /scripts/limit_test.cu -lcudart && /tmp/limit_test"]
    env:
    - name: ALLOC_MIB
      value: "3072"
    - name: CUDA_MPS_PINNED_DEVICE_MEM_LIMIT
      value: "0=4096M"
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      claims: [{name: gpu}]
  volumes:
  - name: scripts
    configMap:
      name: m11-1c-mps-limit-cuda
  resourceClaims: [{name: gpu, resourceClaimName: m11-1c-mps-limit-claim}]
  restartPolicy: Never
