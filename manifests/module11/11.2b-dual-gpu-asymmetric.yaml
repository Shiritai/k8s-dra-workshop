# M11.2b: Multi-Device MPS per Pod — Asymmetric Split
#
# Design: 2 ResourceClaims with different sharing modes on different MIG devices.
#   - Claim 1: exclusive (no MPS/sharing config) targeting a MIG slice
#   - Claim 2: MPS at 30% targeting a different MIG slice
#
# This tests whether a single Pod can mix exclusive and MPS access across
# two different MIG devices.

apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-2b-claim-exclusive
spec:
  devices:
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com

---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-2b-claim-mps
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 30
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com

---
apiVersion: v1
kind: Pod
metadata:
  name: m11-2b-asymmetric
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-base-ubuntu22.04
    command:
    - sh
    - -c
    - |
      echo '=== Asymmetric Device Pod (MIG exclusive + MIG MPS 30%) ==='
      echo "CUDA_VISIBLE_DEVICES=$CUDA_VISIBLE_DEVICES"
      nvidia-smi -L
      nvidia-smi
      echo '=== MPS check ==='
      env | grep -i mps || echo "No MPS env vars"
      sleep 3600
    resources:
      claims:
      - name: gpu-exclusive
      - name: gpu-mps
  resourceClaims:
  - name: gpu-exclusive
    resourceClaimName: m11-2b-claim-exclusive
  - name: gpu-mps
    resourceClaimName: m11-2b-claim-mps
  restartPolicy: Never
