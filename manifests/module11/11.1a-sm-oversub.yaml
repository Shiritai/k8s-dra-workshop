# M11.1a: SM Oversubscription via MPS
# Goal: 3 Pods each requesting 50% SM threads (total 150% > 100%).
#       Observe whether K8s schedules all 3, and whether MPS enforces or allows oversubscription.
# Setup: Uses a single shared MIG device (7g.40gb) with MPS enabled.

apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: m11-1a-claim
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: MigDeviceConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 50
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: mig.nvidia.com
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1a-pod-1
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-base-ubuntu22.04
    command: ["sh", "-c", "echo 'SM-oversub Pod-1'; nvidia-smi; sleep 3600"]
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: m11-1a-claim}]
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1a-pod-2
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-base-ubuntu22.04
    command: ["sh", "-c", "echo 'SM-oversub Pod-2'; nvidia-smi; sleep 3600"]
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: m11-1a-claim}]
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: m11-1a-pod-3
spec:
  containers:
  - name: cuda-ctr
    image: nvidia/cuda:12.3.1-base-ubuntu22.04
    command: ["sh", "-c", "echo 'SM-oversub Pod-3'; nvidia-smi; sleep 3600"]
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: m11-1a-claim}]
  restartPolicy: Never
