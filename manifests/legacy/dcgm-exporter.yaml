apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: nvidia-system
  labels:
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  template:
    metadata:
      labels:
        app: dcgm-exporter
    spec:
      hostPID: true
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - operator: Exists
      containers:
      - name: exporter
        image: nvidia/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
        env:
        - name: DCGM_EXPORTER_KUBERNETES
          value: "true"
        - name: DCGM_EXPORTER_LISTEN
          value: ":9400"
        - name: LD_LIBRARY_PATH
          value: "/usr/lib/x86_64-linux-gnu"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "all"
        securityContext:
          privileged: false
          capabilities:
            add: ["SYS_ADMIN"]
        ports:
        - name: metrics
          containerPort: 9400
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: pod-resources
          mountPath: /var/lib/kubelet/pod-resources
          readOnly: true
        - name: libnvidia-ml-so
          mountPath: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so
        - name: libnvidia-ml-1
          mountPath: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
        - name: libnvidia-ml-ver
          mountPath: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.580.95.05
        - name: libcuda
          mountPath: /usr/lib/x86_64-linux-gnu/libcuda.so
        - name: libcuda-1
          mountPath: /usr/lib/x86_64-linux-gnu/libcuda.so.1
        - name: libcuda-ver
          mountPath: /usr/lib/x86_64-linux-gnu/libcuda.so.580.95.05
      volumes:
      - name: pod-resources
        hostPath:
          path: /var/lib/kubelet/pod-resources
      - name: libnvidia-ml-so
        hostPath:
          path: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
      - name: libnvidia-ml-1
        hostPath:
          path: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
      - name: libnvidia-ml-ver
        hostPath:
          path: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.580.95.05
      - name: libcuda
        hostPath:
          path: /usr/lib/x86_64-linux-gnu/libcuda.so
      - name: libcuda-1
        hostPath:
          path: /usr/lib/x86_64-linux-gnu/libcuda.so.1
      - name: libcuda-ver
        hostPath:
          path: /usr/lib/x86_64-linux-gnu/libcuda.so.580.95.05
