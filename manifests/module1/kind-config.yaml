kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  image: kindest/node:v1.34.0
  # GPU PASSTHROUGH CONFIGURATION
  # These mounts are automatically generated by helper-generate-kind-config.sh
  extraMounts:

  - hostPath: /usr/bin/nvidia-smi
    containerPath: /usr/bin/nvidia-smi
  - hostPath: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
    containerPath: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
  - hostPath: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.580.95.05
    containerPath: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.580.95.05
  - hostPath: /usr/lib/x86_64-linux-gnu/libcuda.so.1
    containerPath: /usr/lib/x86_64-linux-gnu/libcuda.so.1
  - hostPath: /usr/lib/x86_64-linux-gnu/libcuda.so.580.95.05
    containerPath: /usr/lib/x86_64-linux-gnu/libcuda.so.580.95.05
  - hostPath: /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1
    containerPath: /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1
  - hostPath: /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.580.95.05
    containerPath: /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.580.95.05
  - hostPath: /usr/bin/nvidia-cuda-mps-control
    containerPath: /usr/bin/nvidia-cuda-mps-control
  - hostPath: /usr/bin/nvidia-cuda-mps-server
    containerPath: /usr/bin/nvidia-cuda-mps-server
  - hostPath: /etc/cdi
    containerPath: /var/run/cdi
    readOnly: true
  - hostPath: /dev/nvidia0
    containerPath: /dev/nvidia0
  - hostPath: /dev/nvidiactl
    containerPath: /dev/nvidiactl
  - hostPath: /dev/nvidia-uvm
    containerPath: /dev/nvidia-uvm
  - hostPath: /dev/nvidia-modeset
    containerPath: /dev/nvidia-modeset
  - hostPath: /dev/shm
    containerPath: /dev/shm
  # LABELS FOR SCHEDULING
  labels:
    nvidia.com/gpu.present: "true"

featureGates:
  "DRAConsumableCapacity": true
  "DRAAdminAccess": true
  # "DRAResourceChange": true

containerdConfigPatches:
- |-
  [plugins."io.containerd.grpc.v1.cri".containerd]
    enable_cdi = true
  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
    runtime_type = "io.containerd.runc.v2"
