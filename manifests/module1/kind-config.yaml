kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
featureGates:
  "DynamicResourceAllocation": true
  "DRAConsumableCapacity": true
  "DRAAdminAccess": true
nodes:
- role: control-plane
  image: kindest/node:v1.34.0
  extraMounts:

  - hostPath: /usr/bin/nvidia-smi
    containerPath: /usr/bin/nvidia-smi
  - hostPath: /usr/bin/nvidia-ctk
    containerPath: /usr/bin/nvidia-ctk
  - hostPath: /usr/bin/nvidia-container-runtime
    containerPath: /usr/bin/nvidia-container-runtime
  - hostPath: /usr/lib/aarch64-linux-gnu/libnvidia-ml.so.1
    containerPath: /usr/lib/aarch64-linux-gnu/libnvidia-ml.so.1
  - hostPath: /usr/lib/aarch64-linux-gnu/libnvidia-ml.so.570.124.06
    containerPath: /usr/lib/aarch64-linux-gnu/libnvidia-ml.so.570.124.06
  - hostPath: /usr/lib/aarch64-linux-gnu/libcuda.so.1
    containerPath: /usr/lib/aarch64-linux-gnu/libcuda.so.1
  - hostPath: /usr/lib/aarch64-linux-gnu/libcuda.so.570.124.06
    containerPath: /usr/lib/aarch64-linux-gnu/libcuda.so.570.124.06
  - hostPath: /usr/lib/aarch64-linux-gnu/libnvidia-ptxjitcompiler.so.1
    containerPath: /usr/lib/aarch64-linux-gnu/libnvidia-ptxjitcompiler.so.1
  - hostPath: /usr/lib/aarch64-linux-gnu/libnvidia-ptxjitcompiler.so.570.124.06
    containerPath: /usr/lib/aarch64-linux-gnu/libnvidia-ptxjitcompiler.so.570.124.06
  - hostPath: /usr/bin/nvidia-cuda-mps-control
    containerPath: /usr/bin/nvidia-cuda-mps-control
  - hostPath: /usr/bin/nvidia-cuda-mps-server
    containerPath: /usr/bin/nvidia-cuda-mps-server
  - hostPath: /dev/nvidiactl
    containerPath: /dev/nvidiactl
  - hostPath: /dev/nvidia-uvm
    containerPath: /dev/nvidia-uvm
  - hostPath: /dev/nvidia-uvm-tools
    containerPath: /dev/nvidia-uvm-tools
  - hostPath: /dev/nvidia-modeset
    containerPath: /dev/nvidia-modeset
  - hostPath: /dev/nvidia0
    containerPath: /dev/nvidia0
  - hostPath: /dev/nvidia1
    containerPath: /dev/nvidia1
  - hostPath: /dev/nvidia-caps
    containerPath: /dev/nvidia-caps
  - hostPath: /dev/shm
    containerPath: /dev/shm
  kubeadmConfigPatches:
  - |
    kind: KubeletConfiguration
    featureGates:
      DynamicResourceAllocation: true
      DRAConsumableCapacity: true
      DRAAdminAccess: true
  labels:
    nvidia.com/gpu.present: "true"
