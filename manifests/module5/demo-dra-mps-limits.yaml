# Module 5.5 Part A: DRA-Managed MPS with Resource Limits
# Compare with Module 5: limits declared in GpuConfig, not Pod env vars.
# Driver auto-configures MPS daemon with these limits.

apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: gpu-claim-dra-mps-limited
spec:
  devices:
    config:
    - opaque:
        driver: gpu.nvidia.com
        parameters:
          apiVersion: resource.nvidia.com/v1beta1
          kind: GpuConfig
          sharing:
            strategy: MPS
            mpsConfig:
              defaultActiveThreadPercentage: 20
              defaultPinnedDeviceMemoryLimit: 1Gi
    requests:
    - name: gpu-req
      exactly:
        count: 1
        deviceClassName: gpu.nvidia.com
---
apiVersion: v1
kind: Pod
metadata:
  name: dra-mps-limited
spec:
  containers:
  - name: cuda-container
    image: nvidia/cuda:12.3.1-devel-ubuntu22.04
    command: ["sh", "-c", "echo 'DRA-MPS Limited Pod'; nvidia-smi; sleep 3600"]
    resources:
      claims: [{name: gpu}]
  resourceClaims: [{name: gpu, resourceClaimName: gpu-claim-dra-mps-limited}]
  restartPolicy: Never
